services:
  - type: web
    name: campus-copies-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: AGENT_API_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        sync: false
      - key: STORAGE_DIR
        value: "/opt/render/project/src/uploads" # Warning: Render free tier wipes this
